query HomePage {
	homepage {
		title
		subtitle
		highlightText
		featuredProjects {
			title
			image {
				url
				title
				alt
			}
		}
		featuredProjectTitle
		featuredProjectSubtitle
		blogTitle
		featuredBlogPosts {
			image {
				url
				title
				alt
			}
			title
		}
	}
}
